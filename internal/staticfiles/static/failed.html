<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Report Failed</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
    .card { background: #fff; border-radius: 8px; padding: 2rem 3rem; box-shadow: 0 2px 8px rgba(0,0,0,.1); text-align: center; }
    h1 { margin: 0 0 .5rem; font-size: 1.5rem; color: #c62828; }
    p { color: #555; margin: .5rem 0 0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Report processing failed</h1>
    <p>{{.Message}}</p>
    <p>Please re-upload the report or contact your administrator.</p>
  </div>
</body>
</html>
